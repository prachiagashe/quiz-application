<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Styles (Layered over Bootstrap) -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="d-flex align-items-center min-vh-100">
    <div class="container main-container text-center">
        <header class="mb-5">
            <h1 class="display-4 fw-bold custom-title">Quiz Master 🚀</h1>
            <p class="text-muted">Test your knowledge.</p>
        </header>

        <main id="app-content">
            <div class="card custom-card mx-auto shadow-lg p-4 p-md-5 text-start">
                <h2 class="mb-4 text-center fw-semibold text-white">Welcome to the Quiz Application</h2>
                <div class="mb-4">
                    <label for="username" class="form-label text-muted">Enter Your Name</label>
                    <input type="text" id="username" class="form-control custom-input" placeholder="e.g. John Doe">
                </div>
                <button id="start-btn" class="btn btn-primary custom-btn w-100 py-2 fs-5">Start Quiz</button>
            </div>
            
            <p id="api-status" class="mt-4 status-msg"></p>
        </main>
    </div>
    
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
